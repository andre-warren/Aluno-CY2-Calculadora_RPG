<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/reset.css">
  <link rel="stylesheet" href="CSS/rodape.css">
</head>

<body>
  <main>

    <section id="tabela">
      <table class="tabela">
        <tr> <!-- table row -->
          <td>
            <div id="containerDicaRaca">
              <div id="celulaVazia"><span></span></div>
            </div>
          </td>
          <th class="thHabilidades">Valor</th>
          <th class="thHabilidades">D20</th>
          <th class="thModificadores">MOD</th>
          <th class="thTotal">Total</th>
        </tr>
        <tr>
          <th>
            <span class="thMaior">FOR</span>
            <span class="thMenor">Força</span>
          </th>
          <td><input type="number" id="valorForca" class="campoTabela for base"></td>
          <td><input type="number" id="d20forca" class="campoTabela for d20" disabled></td>
          <td><input type="number" id="modForca" class="campoTabela for mod" disabled></td>
          <td><input type="number" id="totalForca" class="campoTabela for total" disabled></td>
        </tr>
        <tr>
          <th>
            <span class="thMaior">DES</span>
            <span class="thMenor">Destreza</span>
          </th>
          <td><input type="number" id="valorDestreza" class="campoTabela des base"></td>
          <td><input type="number" id="d20Destreza" class="campoTabela des d20" disabled></td>
          <td><input type="number" id="modDestreza" class="campoTabela des mod" disabled></td>
          <td><input type="number" id="totalDestreza" class="campoTabela des total" disabled></td>
        </tr>
        <tr>
          <th>
            <span class="thMaior">CON</span>
            <span class="thMenor">Constituição</span>
          </th>
          <td><input type="number" id="valorConstituicao" class="campoTabela con base"></td>
          <td><input type="number" id="d20Constituicao" class="campoTabela con d20" disabled></td>
          <td><input type="number" id="modConstituicao" class="campoTabela con mod" disabled></td>
          <td><input type="number" id="totalConstituicao" class="campoTabela con total" disabled></td>
        </tr>
        <tr>
          <th>
            <span class="thMaior">INT</span>
            <span class="thMenor">Inteligência</span>
          </th>
          <td><input type="number" id="valorInteligencia" class="campoTabela int base"></td>
          <td><input type="number" id="d20Inteligencia" class="campoTabela int d20" disabled></td>
          <td><input type="number" id="modInteligencia" class="campoTabela int mod" disabled></td>
          <td><input type="number" id="totalInteligencia" class="campoTabela int total" disabled></td>
        </tr>
        <tr>
          <th>
            <span class="thMaior">SAB</span>
            <span class="thMenor">Sabedoria</span>
          </th>
          <td><input type="number" id="valorSabedoria" class="campoTabela sab base"></td>
          <td><input type="number" id="d20Sabedoria" class="campoTabela sab d20" disabled></td>
          <td><input type="number" id="modSabedoria" class="campoTabela sab mod" disabled></td>
          <td><input type="number" id="totalSabedoria" class="campoTabela sab total" disabled></td>
        </tr>
        <tr>
          <th>
            <span class="thMaior">CAR</span>
            <span class="thMenor">Carisma</span>
          </th>
          <td><input type="number" id="valorCarisma" class="campoTabela car base"></td>
          <td><input type="number" id="d20Carisma" class="campoTabela car d20" disabled></td>
          <td><input type="number" id="modCarisma" class="campoTabela car mod" disabled></td>
          <td><input type="number" id="totalCarisma" class="campoTabela car total" disabled></td>
        </tr>
      </table>
    </section>
    <section id="botoes">
      <div>
        <input class="calcular" type="button" value="Calcular" id="calcular">
        <input class="calcular" type="button" value="Rodar dado" id="dado">
        <input class="resetar" type="button" value="Resetar" id="resetar">
      </div>
    </section>
  </main>
  <!-- <footer>
    <div class="caixaFooter">Desenvolvido por <a href="" target="_blank">Aluno Ctrl+Play</a>.
    </div>
  </footer> -->
  <script src="JavaScript\script.js"></script>
</body>

</html>
